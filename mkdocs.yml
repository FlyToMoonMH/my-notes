site_name: FlyToMoonMH 的笔记本
site_url: https://FlyToMoonMH.github.io/my-notes/
site_description: FlyToMoonMH 的个人笔记与学习记录
site_author: FlyToMoonMH
copyright: Copyright &copy; 2026 FlyToMoonMH

repo_name: FlyToMoonMH/my-notes
repo_url: https://github.com/FlyToMoonMH/my-notes
edit_uri: tree/main/docs

theme:
  name: material
  custom_dir: overrides
  language: zh
  icon:
    logo: material/notebook-outline
  font: false
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
    - scheme: slate
      primary: indigo
      accent: indigo
  features:
    - content.code.annotate
    - navigation.tracking
    - navigation.top
    - navigation.tabs
    - navigation.footer
    - navigation.indexes

nav:
  - Home:
      - index.md
      - 更新记录: changelog.md
      - 朋友链接: links.md
  - Setup:
      - setup/index.md
      - 第一步：改成你自己的站: setup/first-steps.md
      - 发布到 GitHub Pages: setup/github-pages.md
  - Notes:
      - notes/index.md
      - Markdown 示例: notes/markdown-demo.md
      - 归档页示例: archive.md
      - 认识相机: notes/认识相机.md
  - About:
      - about.md

markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 4
  - meta
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - sane_lists
  - tables
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true

plugins:
  - search
  - heti:
      disable_serve: false

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/FlyToMoonMH

extra_css:
  - https://cdn.tonycrane.cc/jbmono/jetbrainsmono.css
  - https://cdn.tonycrane.cc/lxgw/lxgwscreen.css
  - css/tasklist.css
  - css/custom.css
  - css/card.css
  - css/flink.css
  - css/changelog_extra.css
  - css/toc_extra.css
  - css/svg_extra.css
