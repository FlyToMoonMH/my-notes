site_name: FlyToMoonMH 的笔记本
site_url: https://FlyToMoonMH.github.io/my-notes/
site_description: FlyToMoonMH 的个人笔记与学习记录
site_author: FlyToMoonMH
copyright: Copyright &copy; 2026 FlyToMoonMH

repo_name: FlyToMoonMH/my-notes
repo_url: https://github.com/FlyToMoonMH/my-notes
edit_uri: tree/main/docs

theme:
  name: material
  custom_dir: overrides
  language: zh
  icon:
    logo: material/notebook-outline
  font: false
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
    - scheme: slate
      primary: indigo
      accent: indigo
  features:
    - content.code.annotate
    - navigation.tracking
    - navigation.top
    - navigation.tabs
    - navigation.footer
    - navigation.indexes

validation:
  nav:
    omitted_files: info
    not_found: warn
    absolute_links: info
  links:
    not_found: ignore
    absolute_links: ignore
    unrecognized_links: ignore

nav:
  - Home:
      - index.md
      - 更新记录: changelog.md
      - 朋友链接: links.md
  - Setup:
      - setup/index.md
      - 第一步：改成你自己的站: setup/first-steps.md
      - 发布到 GitHub Pages: setup/github-pages.md
  - Notes:
      - notes/index.md
      - Markdown 示例: notes/markdown-demo.md
      - 归档页示例: archive.md
      - Shell 备忘: notes/Shell.md
      - 认识相机: notes/认识相机.md
      - 毕业论文: notes/毕业论文.md
      - 答辩逐字稿: notes/毕业论文-答辩逐字稿.md
  - About:
      - about.md

markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 4
  - meta
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - sane_lists
  - tables
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true

plugins:
  - search
  - glightbox:
      width: 80%
  - git-revision-date-localized:
      type: datetime
      timezone: Asia/Shanghai
      locale: zh
      enable_creation_date: true
      enable_git_follow: true
      exclude:
        - index.md
        - changelog.md
        - links.md
        - about.md
  - changelog
  - statistics:
      page_check_metadata: comment
  - heti:
      disable_serve: false

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/FlyToMoonMH
  analytics:
    provider: custom
    property: !ENV [GOOGLE_ANALYTICS_ID, ""]
  comments:
    provider: utterances
    repo: FlyToMoonMH/my-notes
    issue_term: pathname
    label: comments
    light_theme: github-light
    dark_theme: github-dark
    giscus:
      repo: FlyToMoonMH/my-notes
      repo_id: R_kgDOSAh5iw
      category: General
      category_id: ""
      mapping: pathname

extra_css:
  - https://cdn.tonycrane.cc/lxgw/lxgwscreen.css
  - https://cdn.tonycrane.cc/jbmono/jetbrainsmono.css
  - css/tasklist.css
  - css/custom.css
  - css/card.css
  - css/flink.css
  - css/changelog_extra.css
  - css/toc_extra.css
  - css/svg_extra.css

hooks:
  - hooks/auto_changelog.py
