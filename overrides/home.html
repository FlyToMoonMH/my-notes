{% extends "main.html" %}

{% block tabs %}{% endblock %}

{% block content %}
  <section class="hero">
    <div class="hero__inner">
      <p class="hero__eyebrow">TonyCrane 风格参考模板</p>
      <h1 class="hero__title">个人笔记 / 博客 / 知识归档</h1>
      <p class="hero__lead">
        用 MkDocs Material 做一个偏文档风格、适合长期维护的个人站点。
      </p>
      <div class="hero__actions">
        <a class="hero__button" href="{{ 'setup/first-steps/' | url }}">先改成你自己的站</a>
        <a class="hero__button hero__button--ghost" href="{{ 'notes/markdown-demo/' | url }}">看看 Markdown 示例</a>
      </div>
    </div>
  </section>

  <section class="grid-cards">
    <article class="panel">
      <h2>最近更新</h2>
      <div id="recent-updates" class="list-compact"></div>
    </article>
    <article class="panel">
      <h2>朋友链接</h2>
      <div id="friend-links" class="friend-grid"></div>
    </article>
    <article class="panel">
      <h2>站点统计</h2>
      <div id="site-stats" class="stats-grid"></div>
    </article>
  </section>

  <section class="panel">
    {{ page.content }}
  </section>
{% endblock %}
