{% extends "main.html" %}

{% block content %}
  <section class="hero">
    <div class="hero__inner">
      <p class="hero__eyebrow">FlyToMoonMH / Personal Notes</p>
      <h1 class="hero__title">技术笔记 / 博客 / 知识归档</h1>
      <p class="hero__lead">
        用 Markdown 持续整理课程、技术、工具和零散想法，让内容像文档一样长期可检索。
      </p>
      <div class="hero__actions">
        <a class="hero__button" href="{{ 'setup/first-steps/' | url }}">先改成你自己的站</a>
        <a class="hero__button hero__button--ghost" href="{{ 'notes/markdown-demo/' | url }}">看看 Markdown 示例</a>
      </div>
    </div>
  </section>

  <section class="grid-cards">
    <article class="panel">
      <h2>最近更新</h2>
      <div id="recent-updates" class="list-compact"></div>
    </article>
    <article class="panel">
      <h2>朋友链接</h2>
      <div id="friend-links" class="friend-grid"></div>
    </article>
    <article class="panel">
      <h2>站点统计</h2>
      <div id="site-stats" class="stats-grid"></div>
    </article>
  </section>

  <section class="panel">
    {{ page.content }}
  </section>
{% endblock %}
