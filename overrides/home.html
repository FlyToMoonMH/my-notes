{% extends "main.html" %}

{% block extrahead %}
  <link rel="stylesheet" href="{{ 'assets/cards/home-cards.css' | url }}">
  <script type="module" src="{{ 'assets/cards/home-cards.js' | url }}"></script>
  <style>
    body {
      background-image: url("{{ 'assets/images/home/light.jpg' | url }}");
      background-position: center top;
      background-size: cover;
      background-attachment: fixed;
    }

    body[data-md-color-scheme="slate"] {
      background-image: url("{{ 'assets/images/home/dark.jpg' | url }}");
    }

    .md-header,
    .md-tabs,
    .md-footer,
    .md-footer-meta {
      background-color: transparent;
    }

    @media screen and (min-width: 1220px) {
      .sidebar_nav {
        height: 0 !important;
      }
    }

    .md-main {
      display: flex;
      flex-direction: column;
    }

    .md-main__inner {
      flex: 1;
      display: flex;
      margin-top: 1.5rem;
      flex-direction: column;
      justify-content: space-between;
      width: 100%;
    }

    .md-content {
      flex-grow: initial;
    }

    .md-content__inner {
      margin: 0 !important;
    }

    .md-header--shadow {
      box-shadow: none !important;
    }

    .home-intro {
      max-width: 38rem;
      margin-left: 0.8rem;
      padding: 1rem 1.2rem;
      border-radius: 0.35rem;
      background: rgb(255 255 255 / 58%);
      backdrop-filter: blur(6px);
    }

    body[data-md-color-scheme="slate"] .home-intro {
      background: rgb(0 0 0 / 36%);
    }

    .home-card {
      width: min(28rem, 100%);
      border-color: transparent;
      font-size: 75%;
      background: rgb(255 255 255 / 72%);
      backdrop-filter: blur(6px);
    }

    body[data-md-color-scheme="slate"] .home-card {
      background: rgb(0 0 0 / 42%);
    }

    @media (max-width: 960px) {
      body {
        background-attachment: scroll;
      }

      .home-intro {
        max-width: none;
        margin-left: 0;
        padding: 0;
        background: transparent;
        backdrop-filter: none;
      }

      .home-card {
        width: 100%;
      }
    }
  </style>
{% endblock %}

{% block site_nav %}
  <div style="flex-grow: 1;">
    <div class="md-sidebar md-sidebar--primary" data-md-component="sidebar" data-md-type="navigation">
      <div class="md-sidebar__scrollwrap sidebar_nav">
        <div class="md-sidebar__inner">
          {% include "partials/nav.html" %}
        </div>
      </div>
    </div>
  </div>
{% endblock %}

{% block content %}
  <div id="app"></div>
  <div class="md-typeset" style="display: block; background-color: transparent; font-size: 125%;">
    <div class="md-grid">
      <div class="home-intro">
        {{ page.content }}
      </div>
    </div>
  </div>
{% endblock %}
